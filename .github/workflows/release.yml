name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            build-cmd: build:win
          - os: macos-latest
            build-cmd: build:mac
          - os: ubuntu-latest
            build-cmd: build:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm turbo build --filter=@freedom-studio/types --filter=@freedom-studio/crypto-core --filter=@freedom-studio/ui

      - name: Build desktop app
        run: pnpm --filter @freedom-studio/desktop ${{ matrix.build-cmd }}

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/desktop/dist/*.exe
            apps/desktop/dist/*.dmg
            apps/desktop/dist/*.AppImage
            apps/desktop/dist/*.deb
            apps/desktop/dist/*.yml
            apps/desktop/dist/*.yaml
            apps/desktop/dist/*.blockmap
          draft: false
          prerelease: ${{ contains(github.ref_name, 'dev') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
